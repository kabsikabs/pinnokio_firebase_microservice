name: Deploy firebase_microservice

on:
  push:
    branches: [deploy/prod]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'start.sh'
      - 'requirements.txt'
      - 'ecs-taskdef*.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: pinnokio_microservice
  ECS_CLUSTER: pinnokio_cluster
  ECS_SERVICE: pinnokio_microservice_service
  ECS_TASK_FAMILY: pinnokio_microservice
  CONTAINER_NAME: pinnokio_microservice
  IMAGE_TAG: ${{ github.sha }}
  ECS_TG_ARN: arn:aws:elasticloadbalancing:us-east-1:654654322636:targetgroup/new-pinnokio-firebase-backend/6c7046f6f3969fee

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest .
          docker push --all-tags $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-taskdef.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          environment-variables: |
            GOOGLE_SERVICE_ACCOUNT_JSON_B64=${{ secrets.GCP_SECRET_B64 }}

      - name: Ensure ECS service exists
        run: |
          STATUS=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$STATUS" != "ACTIVE" ]; then
            echo "Creating ECS service $ECS_SERVICE..."
            aws ecs create-service \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --task-definition ${{ env.ECS_TASK_FAMILY }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --load-balancers targetGroupArn=${{ env.ECS_TG_ARN }},containerName=${{ env.CONTAINER_NAME }},containerPort=8090 \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-00df58195d208c57b,subnet-0b7e260f32cdac3e7],securityGroups=[sg-0ce779d7b19d57649],assignPublicIp=ENABLED}"
          fi

      - name: Deploy Amazon ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10
